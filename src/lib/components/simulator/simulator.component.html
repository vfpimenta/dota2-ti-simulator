<div style="padding:1rem;max-width:900px;margin:0 auto;">
    <h2>TI Simulator</h2>
    <p>Simulate a random TI run for your team. Results are randomized but use player strength.</p>

    <div *ngIf="team.length===0">
        <p>No team yet. Go to Draft to create one.</p>
    </div>

    <div *ngIf="team.length">
        <h3>Your Team</h3>
        <ol>
        <li *ngFor="let p of team">{{p.name}} — {{p.role}} — Power: {{p.power}}</li>
        </ol>
        <div style="margin-top:1rem;">
        <button (click)="runTournament()">Run Tournament</button>
        </div>
        <div *ngIf="result">
        <h4>Result</h4>
        <p>{{result}}</p>
        </div>
    </div>
</div>
